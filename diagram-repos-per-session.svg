<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 236" width="380" height="236" role="img" aria-labelledby="t2 d2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="t2">One session, many repos</title>
  <desc id="d2">A single Klaussy session spanning several repositories at once.</desc>
  <defs>
    <marker id="arrow2" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <text x="190" y="22" text-anchor="middle" font-family="'SF Mono','Fira Code',Menlo,Consolas,monospace" font-size="12.5" font-weight="500" letter-spacing="0.04em" fill="#9ba3b8">one session &#8594; many repos</text>

  <!-- arrows: one session fans out to three repos -->
  <g fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9">
    <path d="M118,128 C 182,128 198,60 256,60" marker-end="url(#arrow2)"/>
    <path d="M118,128 L 256,128" marker-end="url(#arrow2)"/>
    <path d="M118,128 C 182,128 198,196 256,196" marker-end="url(#arrow2)"/>
  </g>

  <!-- session node (accent) -->
  <rect x="14" y="105" width="104" height="46" rx="10" fill="#1d1733" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="66" y="128" text-anchor="middle" dominant-baseline="central" font-size="13.5" font-weight="600" fill="#e9ebf2">Session</text>

  <!-- repo nodes (neutral) -->
  <g>
    <rect x="262" y="40" width="104" height="40" rx="10" fill="#1a1e2a" stroke="#39415a" stroke-width="1"/>
    <text x="314" y="60" text-anchor="middle" dominant-baseline="central" font-size="13.5" font-weight="600" fill="#e9ebf2">api</text>

    <rect x="262" y="108" width="104" height="40" rx="10" fill="#1a1e2a" stroke="#39415a" stroke-width="1"/>
    <text x="314" y="128" text-anchor="middle" dominant-baseline="central" font-size="13.5" font-weight="600" fill="#e9ebf2">web</text>

    <rect x="262" y="176" width="104" height="40" rx="10" fill="#1a1e2a" stroke="#39415a" stroke-width="1"/>
    <text x="314" y="196" text-anchor="middle" dominant-baseline="central" font-size="13.5" font-weight="600" fill="#e9ebf2">infra</text>
  </g>
</svg>
